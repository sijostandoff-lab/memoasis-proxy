    <meta charset="UTF-8">

    <title>MEMOASIS | Secure Proxy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0088cc;
            --primary-orange: #ff7300;
            --bg-light: #f5f7fa;
            --glass: rgba(255, 255, 255, 0.7);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-light);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            color: #333;
        }

        /* Анимированный фон с шестеренками как на баннере */
        .bg-decor {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .gear {
            position: absolute;
            fill: rgba(0, 0, 0, 0.03);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Стеклянная карта */
        .container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 60px 40px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 85%;
            position: relative;
        }

        .logo {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .logo span:first-child { color: #000; }
        .logo span:last-child { color: var(--primary-orange); }

        .tagline {
            font-size: 14px;
            color: var(--primary-blue);
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .status-badge {
            background: rgba(0, 255, 136, 0.1);
            color: #00ad5b;
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 40px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff88;
        }

        /* Кнопка в стиле Telegram Glass */
        .btn {
            background: linear-gradient(135deg, var(--primary-blue), #00aaff);
            color: white;
            padding: 20px 40px;
            text-decoration: none;
            border-radius: 20px;
            font-weight: 700;
            font-size: 18px;
            display: block;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0, 136, 204, 0.3);
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 40px rgba(0, 136, 204, 0.4);
        }

        .footer {
            margin-top: 40px;
            font-size: 11px;
            color: #999;
            line-height: 1.5;
        }
    </style>
</head>
